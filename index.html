<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nima Khodarahmi — iOS Developer & Designer</title>
  <meta name="description" content="Nima Khodarahmi — iOS developer & designer in Naples, Italy. Building expressive apps with Swift & SwiftUI." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <!-- Social share preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Nima Khodarahmi — iOS Developer & Designer" />
  <meta property="og:description" content="iOS developer & designer in Naples, Italy. Building expressive apps with Swift & SwiftUI." />
  <meta property="og:url" content="https://nimakhodarahmi1998.github.io/" />
  <meta property="og:image" content="https://nimakhodarahmi1998.github.io/assets/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Nima Khodarahmi — iOS Developer & Designer" />
  <meta name="twitter:description" content="iOS developer & designer in Naples, Italy." />
  <meta name="twitter:image" content="https://nimakhodarahmi1998.github.io/assets/og.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"></button>

  <main class="split">
    <!-- Photo -->
    <div class="photo">
      <img src="assets/nima.png" alt="Nima Khodarahmi" />
    </div>

    <!-- Identity -->
    <section class="id">
      <p class="id__status"><span class="id__status-dot"></span>Open to work</p>
      <h1 class="id__name">Nima<br />Khodarahmi<span class="id__period">.</span></h1>
      <p class="id__role">iOS Developer &amp; Designer</p>
      <p class="id__place">Naples, Italy</p>
      <p class="id__bio">
        A designer who codes, with a writer's instinct. Building expressive apps with
        Swift &amp; SwiftUI at the Apple Developer Academy.
      </p>
      <nav class="id__links" id="links" aria-label="Elsewhere"></nav>
      <a class="cv" href="assets/Nima-Khodarahmi-CV.pdf" download id="cv"></a>
    </section>

    <!-- Work -->
    <section class="work">
      <h2 class="work__label">Selected work</h2>
      <ul class="work__list" id="work-list"></ul>
    </section>

    <!-- Skills -->
    <section class="skills">
      <h2 class="work__label">Skills</h2>
      <ul class="chips" id="skills"></ul>
    </section>

    <!-- Experience -->
    <section class="exp">
      <h2 class="work__label">Experience</h2>
      <ol class="path" id="path"></ol>
    </section>

    <!-- Languages -->
    <section class="langs">
      <h2 class="work__label">Languages</h2>
      <ul class="lang__list" id="languages"></ul>
    </section>
  </main>

  <script src="js/icons.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
